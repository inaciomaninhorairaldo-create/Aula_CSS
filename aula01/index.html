<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-top: 20px;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Aula CSS</h1>
    <p>Este é um exemplo de CSS básico aplicado diretamente no arquivo HTML.</p>
</body>
</html>
